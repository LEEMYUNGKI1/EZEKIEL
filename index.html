                { date: "2026.03", title: t.news_1_t },
                { date: "2026.01", title: t.news_2_t },
                { date: "2025.11", title: t.news_3_t },
                { date: "2025.08", title: t.news_4_t }
              ].map((news, i) => (
                <div key={i} className="flex justify-between items-center border-b border-gray-100 pb-6 group cursor-pointer hover:border-black transition-colors">
                  <div>
                    <div className="text-sm text-accent mb-2">{news.date}</div>
                    <h4 className="text-lg font-medium group-hover:text-brand text-gray-700 transition-colors">{news.title}</h4>
                  </div>
                  <i data-lucide="arrow-up-right" className="text-gray-300 group-hover:text-brand transition-colors w-5 h-5"></i>
                </div>
              ))}
            </div>
            <div className="mt-8">
                <button className="text-sm font-medium tracking-widest uppercase border-b border-black pb-1 hover:text-accent hover:border-accent transition-colors">{t.pr_more}</button>
            </div>
          </div>

          <div id="문의하기" className="bg-surface p-10 md:p-14 rounded-3xl shadow-sm border border-gray-50">
            <h3 className="text-sm font-medium text-accent tracking-widest uppercase mb-4">{t.contact}</h3>
            <h2 className="text-3xl font-bold mb-8">{t.contact_title}</h2>
            <form className="space-y-5" onSubmit={handleMailSubmit}>
              <div>
                <input name="name" type="text" placeholder={t.contact_ph1} required className="w-full px-5 py-4 bg-white border border-gray-200 rounded-lg focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all text-sm" />
              </div>
              <div>
                <input name="email" type="email" placeholder={t.contact_ph2} required className="w-full px-5 py-4 bg-white border border-gray-200 rounded-lg focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all text-sm" />
              </div>
              <div>
                <textarea name="content" rows="4" placeholder={t.contact_ph3} required className="w-full px-5 py-4 bg-white border border-gray-200 rounded-lg focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all resize-none text-sm"></textarea>
              </div>
              <button type="submit" className="w-full bg-brand text-white py-5 font-medium tracking-widest uppercase text-sm hover:bg-black/90 transition-colors rounded-lg flex justify-center items-center space-x-2 group">
                <span>문의하기</span>
                <i data-lucide="arrow-right" className="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
              </button>
            </form>
          </div>
        </div>
      </section>
      );
    };

    const Footer = () => {
      const { lang, view, setView } = useContext(AppContext);
      const t = translations[lang];

      const handleNavAction = (targetView, sectionId) => {
        if (view !== targetView) {
          setView(targetView);
          if (targetView === 'home' && sectionId) {
            setTimeout(() => scrollToSection(sectionId), 100);
          } else {
            window.scrollTo(0, 0);
          }
        } else if (sectionId) {
          scrollToSection(sectionId);
        }
      };
      return (
      <footer className="bg-brand text-white/50 py-20 border-t border-white/10">
        <div className="max-w-7xl mx-auto px-6 grid md:grid-cols-4 gap-12">
          <div className="col-span-1 md:col-span-2">
            <div className="mb-6 flex space-x-4">
               <img src="./logo-white.png" alt="Company Logo" className="h-12 w-auto object-contain" />
            </div>
            <p className="text-sm leading-relaxed max-w-sm mb-8 text-white/60" dangerouslySetInnerHTML={{__html: t.footer_desc}}>
            </p>
            <div className="flex space-x-4">
               <a href="#" className="w-10 h-10 rounded-full border border-white/20 flex items-center justify-center hover:bg-white hover:text-brand transition-all">
                 <i data-lucide="instagram" className="w-4 h-4"></i>
               </a>
               <a href="#" className="w-10 h-10 rounded-full border border-white/20 flex items-center justify-center hover:bg-white hover:text-brand transition-all">
                 <i data-lucide="linkedin" className="w-4 h-4"></i>
               </a>
               <a href="#" className="w-10 h-10 rounded-full border border-white/20 flex items-center justify-center hover:bg-white hover:text-brand transition-all">
                 <i data-lucide="youtube" className="w-4 h-4"></i>
               </a>
            </div>
          </div>
          <div>
            <h4 className="text-white font-medium mb-6 uppercase tracking-widest text-sm">{t.footer_q}</h4>
            <ul className="space-y-4 text-sm text-white/60">
              <li><a href="#회사소개" className="hover:text-accent hover:translate-x-1 inline-block transition-all" onClick={(e) => { e.preventDefault(); handleNavAction('home', '회사소개'); }}>{t.company}</a></li>
              <li><a href="#사업소개" className="hover:text-accent hover:translate-x-1 inline-block transition-all" onClick={(e) => { e.preventDefault(); handleNavAction('home', '사업소개'); }}>{t.business}</a></li>
              <li><a href="#R&D" className="hover:text-accent hover:translate-x-1 inline-block transition-all" onClick={(e) => { e.preventDefault(); handleNavAction('home', 'R&D'); }}>{t.rnd}</a></li>
              <li><a href="#오시는 길" className="hover:text-accent hover:translate-x-1 inline-block transition-all" onClick={(e) => { e.preventDefault(); handleNavAction('directions'); }}>{t.menu_directions}</a></li>
            </ul>
          </div>
          <div>
            <h4 className="text-white font-medium mb-6 uppercase tracking-widest text-sm">{t.footer_c}</h4>
            <ul className="space-y-4 text-sm text-white/60">
              <li className="flex items-start space-x-3"><i data-lucide="phone" className="w-4 h-4 mt-0.5 opacity-70"></i><span>{t.tel} 031.990.4120</span></li>
              <li className="flex items-start space-x-3"><i data-lucide="printer" className="w-4 h-4 mt-0.5 opacity-70"></i><span>{t.fax} 031.991.4130</span></li>
              <li className="flex items-start space-x-3"><i data-lucide="mail" className="w-4 h-4 mt-0.5 opacity-70"></i><span>ezekielcos1@naver.com</span></li>
              <li className="flex items-start space-x-3 pt-2">
                <i data-lucide="map-pin" className="w-4 h-4 mt-0.5 opacity-70 flex-shrink-0"></i>
                <span className="leading-relaxed" dangerouslySetInnerHTML={{__html: t.footer_a}}></span>
              </li>
            </ul>
          </div>
        </div>
        <div className="max-w-7xl mx-auto px-6 mt-20 pt-8 border-t border-white/10 text-xs flex flex-col md:flex-row justify-between items-center text-white/40">
          <div>&copy; 2026 EZEKIEL Cosmetics Co., Ltd. All rights reserved.</div>
          <div className="mt-4 md:mt-0 flex space-x-6">
            <a href="#" className="hover:text-white transition-colors">{t.footer_p1}</a>
            <a href="#" className="hover:text-white transition-colors">{t.footer_p2}</a>
            <a href="#" className="hover:text-white transition-colors">{t.footer_p3}</a>
          </div>
        </div>
      </footer>
      );
    };
    
    const App = () => {
      const [lang, setLang] = useState('KOR');
      const [view, setView] = useState('home');
      const [heroBg, setHeroBg] = useState('./hero-bg.png');

      useEffect(() => {
        lucide.createIcons();
      }, [lang]);

      return (
        <AppContext.Provider value={{ lang, setLang, view, setView, heroBg, setHeroBg }}>
          <div className="scroll-smooth font-sans">
            <Header />
            {view === 'home' && (
              <React.Fragment>
                <Hero />
                <SectionCompany />
                <SectionBusiness />
                <SectionRnD />
                <SectionInfra />
                <SectionPRAndContact />
              </React.Fragment>
            )}
            {view === 'directions' && <SectionDirections />}
            {view === 'partners' && <SectionPartners />}
            {view === 'ceo' && <SectionCEOMessage />}
            {view === 'philosophy' && <SectionPhilosophy />}
            {view === 'history' && <SectionHistory />}
            {view === 'overview' && <SectionOverview />}
            {view === 'organization' && <SectionOrganization />}
            <Footer />
          </div>
        </AppContext.Provider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
